name: Deploy to GitHub Pages

# Builds the Astro site and publishes it to GitHub Pages, served at the
# custom domain https://genxalpha.xyz (see public/CNAME). The build runs in
# production mode (root base) — not the github.io sub-path preview.
on:
  push:
    branches:
      - main
  # Daily rebuild so the essay lists pick up new Substack posts (the RSS
  # feed is fetched at build time — see src/lib/substack.ts).
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# Permissions required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Enables Pages (source: GitHub Actions) on first run if it isn't yet.
      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
